<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2CW Enterprises — Dashboard Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0d0f;
      --surface:   #13151a;
      --border:    #1e2129;
      --gold:      #d4a843;
      --gold-dim:  #8a6a22;
      --green:     #3db87a;
      --green-dim: #1e6641;
      --text:      #e8eaf0;
      --muted:     #5a6070;
      --subtext:   #9aa0b0;
      --error:     #e05555;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .orb { position: fixed; border-radius: 50%; filter: blur(130px); opacity: 0.1; pointer-events: none; z-index: 0; }
    .orb-gold  { width: 600px; height: 600px; background: var(--gold);  top: -200px; left: -200px; }
    .orb-green { width: 500px; height: 500px; background: var(--green); bottom: -150px; right: -150px; }

    /* ── LAYOUT ── */
    .hub {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px 24px;
    }

    .header { text-align: center; margin-bottom: 56px; animation: fadeUp 0.5s ease both; }
    .wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(44px, 7vw, 88px);
      letter-spacing: 0.06em; line-height: 1;
      background: linear-gradient(135deg, #fff 30%, var(--muted) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .tagline {
      margin-top: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--muted);
    }

    /* ── CARD GRID ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 760px; }

    /* ── PORTAL CARD ── */
    .portal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .portal.kss { animation-delay: 0.1s; }
    .portal.tcw { animation-delay: 0.2s; }
    .portal.kss.active { border-color: var(--gold); box-shadow: 0 0 40px rgba(212,168,67,0.12); }
    .portal.tcw.active { border-color: var(--green); box-shadow: 0 0 40px rgba(61,184,122,0.12); }

    .accent-dot {
      width: 9px; height: 9px; border-radius: 50%; margin-bottom: 18px;
      animation: pulse 2.5s ease-in-out infinite;
    }
    .kss .accent-dot { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
    .tcw .accent-dot { background: var(--green); box-shadow: 0 0 10px var(--green); }

    .portal-label {
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.28em; text-transform: uppercase; margin-bottom: 6px;
    }
    .kss .portal-label { color: var(--gold-dim); }
    .tcw .portal-label { color: var(--green-dim); }

    .portal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 34px; letter-spacing: 0.04em; line-height: 1;
      margin-bottom: 24px;
    }

    /* ── PIN DISPLAY ── */
    .pin-display {
      display: flex; gap: 10px; justify-content: center;
      margin-bottom: 20px;
    }
    .pin-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--muted);
      background: transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .pin-dot.filled { border-color: transparent; }
    .kss .pin-dot.filled { background: var(--gold); }
    .tcw .pin-dot.filled { background: var(--green); }

    /* ── KEYPAD ── */
    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

    .key {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 0;
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      color: var(--text);
      cursor: pointer;
      text-align: center;
      user-select: none;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .key:active { transform: scale(0.94); }
    .kss .key:hover { background: rgba(212,168,67,0.1); border-color: var(--gold-dim); }
    .tcw .key:hover { background: rgba(61,184,122,0.1); border-color: var(--green-dim); }

    .key.del { font-size: 13px; color: var(--muted); }

    /* ── STATUS MESSAGE ── */
    .status {
      text-align: center;
      margin-top: 14px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      height: 16px;
      transition: color 0.2s;
    }
    .status.error { color: var(--error); animation: shake 0.3s ease; }
    .status.ok { color: var(--green); }

    /* ── FOOTER ── */
    .footer {
      margin-top: 52px;
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.2em; color: var(--muted); text-align: center;
      animation: fadeUp 0.5s 0.35s ease both;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.45; transform: scale(0.82); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-6px); }
      75%       { transform: translateX(6px); }
    }
  </style>
</head>
<body>

<div class="orb orb-gold"></div>
<div class="orb orb-green"></div>

<main class="hub">

  <header class="header">
    <div class="wordmark">2CW Enterprises</div>
    <div class="tagline">Dashboard Hub &nbsp;·&nbsp; Authorized Access Only</div>
  </header>

  <div class="grid">

    <!-- KSS -->
    <div class="portal kss" id="kss-portal">
      <div class="accent-dot"></div>
      <div class="portal-label">Territory Portal</div>
      <div class="portal-title">KSS Leaderboard</div>
      <div class="pin-display" id="kss-dots">
        <div class="pin-dot"></div><div class="pin-dot"></div>
        <div class="pin-dot"></div><div class="pin-dot"></div>
      </div>
      <div class="keypad" id="kss-pad">
        <div class="key" onclick="press('kss',1)">1</div>
        <div class="key" onclick="press('kss',2)">2</div>
        <div class="key" onclick="press('kss',3)">3</div>
        <div class="key" onclick="press('kss',4)">4</div>
        <div class="key" onclick="press('kss',5)">5</div>
        <div class="key" onclick="press('kss',6)">6</div>
        <div class="key" onclick="press('kss',7)">7</div>
        <div class="key" onclick="press('kss',8)">8</div>
        <div class="key" onclick="press('kss',9)">9</div>
        <div class="key del" onclick="del('kss')">⌫</div>
        <div class="key" onclick="press('kss',0)">0</div>
        <div class="key" style="opacity:0.2; pointer-events:none;"></div>
      </div>
      <div class="status" id="kss-status"></div>
    </div>

    <!-- 2CW -->
    <div class="portal tcw" id="tcw-portal">
      <div class="accent-dot"></div>
      <div class="portal-label">Internal Portal</div>
      <div class="portal-title">2CW Operations</div>
      <div class="pin-display" id="tcw-dots">
        <div class="pin-dot"></div><div class="pin-dot"></div>
        <div class="pin-dot"></div><div class="pin-dot"></div>
      </div>
      <div class="keypad" id="tcw-pad">
        <div class="key" onclick="press('tcw',1)">1</div>
        <div class="key" onclick="press('tcw',2)">2</div>
        <div class="key" onclick="press('tcw',3)">3</div>
        <div class="key" onclick="press('tcw',4)">4</div>
        <div class="key" onclick="press('tcw',5)">5</div>
        <div class="key" onclick="press('tcw',6)">6</div>
        <div class="key" onclick="press('tcw',7)">7</div>
        <div class="key" onclick="press('tcw',8)">8</div>
        <div class="key" onclick="press('tcw',9)">9</div>
        <div class="key del" onclick="del('tcw')">⌫</div>
        <div class="key" onclick="press('tcw',0)">0</div>
        <div class="key" style="opacity:0.2; pointer-events:none;"></div>
      </div>
      <div class="status" id="tcw-status"></div>
    </div>

  </div>

  <footer class="footer">2CW Enterprises &nbsp;·&nbsp; Confidential &nbsp;·&nbsp; Not for Distribution</footer>

</main>

<script>
  const state = { kss: '', tcw: '' };
  const pins  = { kss: '4200', tcw: '2351' };
  const dests = { kss: '/kss_dashboard.html', tcw: '/twocw_dashboard.html' };

  function updateDots(id) {
    const dots = document.querySelectorAll(`#${id}-dots .pin-dot`);
    dots.forEach((d, i) => d.classList.toggle('filled', i < state[id].length));
  }

  function setStatus(id, msg, type) {
    const el = document.getElementById(`${id}-status`);
    el.textContent = msg;
    el.className = 'status ' + (type || '');
  }

  function press(id, digit) {
    if (state[id].length >= 4) return;
    state[id] += digit;
    updateDots(id);
    document.getElementById(`${id}-portal`).classList.add('active');
    if (state[id].length === 4) check(id);
  }

  function del(id) {
    state[id] = state[id].slice(0, -1);
    updateDots(id);
    setStatus(id, '');
    if (state[id].length === 0) document.getElementById(`${id}-portal`).classList.remove('active');
  }

  function check(id) {
    if (state[id] === pins[id]) {
      setStatus(id, 'Access Granted', 'ok');
      setTimeout(() => { window.location.href = dests[id]; }, 500);
    } else {
      setStatus(id, 'Incorrect PIN', 'error');
      setTimeout(() => {
        state[id] = '';
        updateDots(id);
        setStatus(id, '');
        document.getElementById(`${id}-portal`).classList.remove('active');
      }, 1000);
    }
  }
</script>

</body>
</html>
